[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  AUTH_TRUST_HOST = "true"
  # Demo org is OFF in production: its accounts share DEMO_PASSWORD, whose default
  # ('Password123!') is public in this repo, and some carry HR-level permissions —
  # seeding them on a public URL would hand out privileged logins. Log in with the
  # fixed BOOTSTRAP_ADMIN instead. To enable demo data anyway, set this to "true"
  # AND set a strong DEMO_PASSWORD in the Netlify dashboard (never the default).
  SEED_DEMO = "false"
  BOOTSTRAP_ADMIN_EMAIL = "virajchaudhary@gmail.com"
  # BOOTSTRAP_ADMIN_PASSWORD is NOT committed — set it in the Netlify dashboard
  # (Site settings → Environment variables). Listed below so the secrets scan
  # doesn't flag the dashboard value.
  SECRETS_SCAN_OMIT_PATHS = ".env.example,CLAUDE.md,docs/**"
  SECRETS_SCAN_OMIT_KEYS = "BOOTSTRAP_ADMIN_EMAIL,NEXTAUTH_URL,BOOTSTRAP_ADMIN_PASSWORD"
